name: macOS CI

on: [push, pull_request]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  SPEC_SPLIT_DOTS: 160

jobs:
  darwin-test:
    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.arch }}
    strategy:
      matrix:
        include:
        #- runs-on: macos-13
        #  arch: x86_64-darwin
        - runs-on: macos-14
          arch: aarch64-darwin
    steps:
      - name: Download Crystal source
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true

      - name: Setup
        run: |
          brew install bdw-gc llvm
          curl -sL "https://github.com/crystal-lang/crystal/releases/download/1.17.1/crystal-1.17.1-1-darwin-universal.tar.gz" | tar zx
          echo "PATH=$PWD/crystal-1.17.1-1/bin:/usr/local/opt/llvm/bin:$PATH" >> $GITHUB_ENV

      - name: Test
        run: ./bin/simple_ci

